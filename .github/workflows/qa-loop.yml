# ──────────────────────────────────────────────────────────────────────
# OpSuite QA Loop — Automated E2E Testing
#
# Runs the full 7-day operational simulation against the live deployment.
#
# Triggers:
#   - Every push to main
#   - Nightly at 3:00 AM UTC
#   - Manual dispatch
#
# On failure:
#   - Uploads screenshots, traces, videos, and console logs
#   - Creates a GitHub issue with the failure report
# ──────────────────────────────────────────────────────────────────────

name: QA Loop

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Override APP_URL for testing'
        required: false
        default: ''

env:
  APP_URL: ${{ github.event.inputs.app_url || vars.APP_URL || 'https://claude-task-two.vercel.app' }}
  TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL || 'owner@opsuite.demo' }}
  TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'demo1234' }}

jobs:
  qa-tests:
    name: Run QA Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Install Playwright browsers ─────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # ── Run QA suite ────────────────────────────────────────────────
      - name: Run Playwright tests
        id: tests
        continue-on-error: true
        run: |
          npx playwright test --reporter=list,json,html 2>&1 | tee test-output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/results.json

      # ── Generate failure report ─────────────────────────────────────
      - name: Generate failure report
        if: steps.tests.outcome == 'failure'
        run: |
          node -e "
            const fs = require('fs');
            const path = 'test-results/results.json';
            if (!fs.existsSync(path)) {
              console.log('No results.json found');
              process.exit(0);
            }
            const raw = JSON.parse(fs.readFileSync(path, 'utf8'));
            const suites = raw.suites || [];

            const results = [];
            function extractTests(suite) {
              for (const spec of (suite.specs || [])) {
                for (const test of (spec.tests || [])) {
                  for (const result of (test.results || [])) {
                    results.push({
                      name: spec.title,
                      status: result.status,
                      error: result.error?.message || '',
                      duration: result.duration || 0,
                    });
                  }
                }
              }
              for (const child of (suite.suites || [])) {
                extractTests(child);
              }
            }
            suites.forEach(extractTests);

            const failures = results.filter(r => r.status === 'failed' || r.status === 'timedOut');
            if (failures.length === 0) {
              console.log('No failures found');
              process.exit(0);
            }

            let report = '## 🔴 QA Loop Failure Report\n\n';
            report += '**Date:** ' + new Date().toISOString() + '\n';
            report += '**URL:** ' + process.env.APP_URL + '\n';
            report += '**Total tests:** ' + results.length + '\n';
            report += '**Passed:** ' + results.filter(r => r.status === 'passed').length + '\n';
            report += '**Failed:** ' + failures.length + '\n\n';
            report += '### Failed Tests\n\n';

            for (const f of failures) {
              report += '#### ❌ ' + f.name + '\n';
              report += '- **Duration:** ' + (f.duration / 1000).toFixed(1) + 's\n';
              if (f.error) {
                report += '- **Error:**\n\`\`\`\n' + f.error.substring(0, 800) + '\n\`\`\`\n';
              }
              report += '\n';
            }

            report += '### Artifacts\n';
            report += 'Check the workflow run for screenshots, traces, and video recordings.\n\n';
            report += '---\n*Auto-generated by OpSuite QA Loop*\n';

            fs.writeFileSync('test-results/failure-report.md', report);
            console.log('Failure report generated');
          "

      # ── Upload artifacts ────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-results
          path: |
            test-results/
            playwright-report/
            test-output.log
          retention-days: 14

      # ── Create GitHub issue on failure ──────────────────────────────
      - name: Create failure issue
        if: steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/failure-report.md';
            let body = '## QA Loop Failed\n\nSee workflow run for details.';

            if (fs.existsSync(reportPath)) {
              body = fs.readFileSync(reportPath, 'utf8');
            }

            // Check for existing open QA issue to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'qa-failure',
              state: 'open',
            });

            if (existingIssues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: body + '\n\n**Workflow run:** ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              });
              console.log('Updated existing QA failure issue #' + existingIssues.data[0].number);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔴 QA Loop Failure — ' + new Date().toISOString().split('T')[0],
                body: body + '\n\n**Workflow run:** ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
                labels: ['qa-failure', 'bug'],
              });
              console.log('Created new QA failure issue');
            }

      # ── Final status ────────────────────────────────────────────────
      - name: Check test results
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::QA tests failed. Check the failure report and artifacts."
          exit 1
